<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropLister Pro - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-row">
        <div class="logo-icon">DL</div>
        <div>
          <h1>DropLister Pro Settings</h1>
          <span class="version">v1.0.0 - Unlimited Use</span>
        </div>
      </div>
    </header>

    <div class="grid">
      <!-- General Settings -->
      <section class="card">
        <h2>General Settings</h2>
        <div class="form-group">
          <label><input type="checkbox" id="isInternational"> International Seller</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="hasEbaySubscription" checked> eBay Store Subscription</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="hasTaxExempt" checked> Tax Exempt</label>
        </div>
      </section>

      <!-- Item Location -->
      <section class="card">
        <h2>Item Location</h2>
        <div class="form-group">
          <label><input type="checkbox" id="forceItemLocation" checked> Force Item Location</label>
        </div>
        <div class="form-group">
          <label>Zip/Postal Code</label>
          <input type="text" id="itemLocation" placeholder="10001">
        </div>
        <div class="form-group">
          <label>Country</label>
          <select id="itemLocationCountry">
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="UK">United Kingdom</option>
            <option value="AU">Australia</option>
            <option value="DE">Germany</option>
            <option value="FR">France</option>
            <option value="IT">Italy</option>
            <option value="ES">Spain</option>
            <option value="NL">Netherlands</option>
          </select>
        </div>
        <div class="form-group">
          <label>City, State</label>
          <input type="text" id="itemLocationCityState" placeholder="New York, NY">
        </div>
      </section>

      <!-- Return Policy -->
      <section class="card">
        <h2>Return Policy</h2>
        <div class="form-group">
          <label><input type="checkbox" id="forceReturnPolicy" checked> Force Return Policy</label>
        </div>
        <div class="form-group">
          <label>Return Policy ID</label>
          <input type="text" id="returnPolicyId" placeholder="Enter eBay return policy ID">
        </div>
      </section>

      <!-- Image Settings -->
      <section class="card">
        <h2>Image Settings</h2>
        <div class="form-group">
          <label><input type="checkbox" id="onlyListOnePicture"> Only List First Image</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="useImageTemplate"> Use Image Template</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="useReviewImages"> Include Review Images</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="useAIImage"> Use AI-Enhanced Images</label>
        </div>
        <div class="form-group" id="aiImageSection" style="display:none">
          <label>Gemini API Key (for AI images)</label>
          <input type="password" id="geminiApiKeyImg" placeholder="Enter Gemini 2.5 API Key">
          <label>Image Generation Prompt</label>
          <textarea id="imagePrompt" rows="4">Please generate an image ad for my eBay store using this exact product. The design should be sophisticated and aesthetically pleasing. Use a matching font to highlight 2-5 key benefits. Keep it concise but informative to spark interest.</textarea>
        </div>
      </section>

      <!-- Description Settings -->
      <section class="card">
        <h2>Description Settings</h2>
        <div class="form-group">
          <label><input type="checkbox" id="useSimpleDescription"> Use Simple Description (shorter)</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="useCustomDescPrompt"> Use Custom Description Prompt</label>
        </div>
        <div class="form-group">
          <label>Custom Prompt</label>
          <textarea id="descriptionPrompt" rows="4" placeholder="You are an expert copywriter. Turn the user's text into an appealing product description. Keep it concise and professional."></textarea>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="removeSections"> Remove Shipping/Return/Payment Sections</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="disableThankYou"> Disable Thank You Message</label>
        </div>
      </section>

      <!-- Listing Settings -->
      <section class="card">
        <h2>Listing Settings</h2>
        <div class="form-group">
          <label>Schedule Listing Time</label>
          <select id="scheduleListing">
            <option value="false">Disabled</option>
            <option value="0">12:00 AM</option>
            <option value="1">1:00 AM</option>
            <option value="2">2:00 AM</option>
            <option value="3">3:00 AM</option>
            <option value="4">4:00 AM</option>
            <option value="5">5:00 AM</option>
            <option value="6">6:00 AM</option>
            <option value="7">7:00 AM</option>
            <option value="8">8:00 AM</option>
            <option value="9">9:00 AM</option>
            <option value="10">10:00 AM</option>
            <option value="11">11:00 AM</option>
            <option value="12">12:00 PM</option>
            <option value="13">1:00 PM</option>
            <option value="14">2:00 PM</option>
            <option value="15">3:00 PM</option>
            <option value="16">4:00 PM</option>
            <option value="17">5:00 PM</option>
            <option value="18">6:00 PM</option>
            <option value="19">7:00 PM</option>
            <option value="20">8:00 PM</option>
            <option value="21">9:00 PM</option>
            <option value="22">10:00 PM</option>
            <option value="23">11:00 PM</option>
          </select>
        </div>
        <div class="form-group">
          <label>Promoted Listing Ad Rate (%)</label>
          <input type="number" id="promotedRate" min="0" max="99" step="0.1" value="2.1">
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="fillRequired" checked> Fill Required Item Specifics (AI)</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="fillOptional" checked> Fill Optional Item Specifics (AI)</label>
        </div>
      </section>

      <!-- Filtered Words -->
      <section class="card">
        <h2>Filtered Words</h2>
        <p class="hint">Words to automatically remove from titles (one per line):</p>
        <textarea id="filteredWords" rows="6" placeholder="amazon&#10;prime&#10;renewed&#10;refurbished"></textarea>
      </section>

      <!-- Duplicate Checker -->
      <section class="card" id="duplicate-checker">
        <h2>Duplicate Checker</h2>
        <div class="sku-stats">
          <span>Total SKUs Saved: <strong id="totalSkus">0</strong></span>
        </div>
        <div class="btn-row">
          <button id="exportAllSkus" class="btn">Export SKU List</button>
          <button id="importSkuFile" class="btn">Import SKUs</button>
          <button id="clearAllSkus" class="btn btn-danger">Delete All SKUs</button>
        </div>
        <input type="file" id="skuFileImport" accept=".txt,.csv" style="display:none">
      </section>
    </div>

    <div class="save-bar">
      <button id="saveAll" class="btn btn-primary btn-lg">Save All Settings</button>
      <span id="saveStatus"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
